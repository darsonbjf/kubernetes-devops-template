---
name: Validate Kubernetes Template

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Install validation tools
        shell: bash
        run: |
          set -euo pipefail

          KUBECONFORM_VERSION="0.6.7"
          CONFTEST_VERSION="0.59.0"
          CONFTEST_URL="https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}"

          curl -sSL \
            "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin kubeconform

          curl -sSL \
            "${CONFTEST_URL}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin conftest

          python -m pip install --upgrade pip yamllint

      - name: Validate
        run: STRICT_VALIDATION=true ./scripts/validate.sh
