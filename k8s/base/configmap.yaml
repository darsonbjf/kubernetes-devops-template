---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sample-app-config
  labels:
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/instance: sample-app
    app.kubernetes.io/component: web
data:
  APP_ENV: production
  LOG_LEVEL: info
  default.conf: |
    server {
      listen 8080;
      server_name _;
      server_tokens off;

      location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
      }

      location / {
        add_header Content-Type text/plain;
        return 200 "kubernetes-devops-template\n";
      }
    }
